name: security

# CI security gates — runs on every PR + push to main.
# Failure of any gate FAILS the PR check; merge is blocked.
#
# Gates:
#   1. git-secrets / gitleaks    — never commit AWS keys, JWTs, db pwds
#   2. dependency-review         — block PRs introducing CVE-7+ deps (GitHub native)
#   3. semgrep (SAST)             — Python + JavaScript code-flow analysis
#   4. trivy (image scan)         — block CVE-7+ in pushed container images
#   5. trivy (filesystem)         — secrets + misconfigs in repo
#   6. checkov                    — Terraform misconfig scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents:        read
  pull-requests:   write
  security-events: write     # for SARIF upload to Code Scanning

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }
    - uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: high
        comment-summary-in-pr: always
        # Block GPL / AGPL / EUPL — incompatible with our MIT.
        deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, EUPL-1.2

  semgrep:
    runs-on: ubuntu-latest
    container: returntocorp/semgrep:1.80
    steps:
    - uses: actions/checkout@v4
    - run: |
        semgrep ci \
          --config p/python \
          --config p/typescript \
          --config p/owasp-top-ten \
          --config p/jwt \
          --config p/security-audit \
          --severity ERROR \
          --severity WARNING \
          --sarif --output semgrep.sarif \
          || true
    - uses: github/codeql-action/upload-sarif@v3
      if: always()
      with: { sarif_file: semgrep.sarif, category: semgrep }

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Trivy filesystem scan (secrets + misconfig)
      uses: aquasecurity/trivy-action@0.27.0
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-fs.sarif
        severity: HIGH,CRITICAL
        exit-code: '1'    # fails the job on any HIGH/CRITICAL
    - uses: github/codeql-action/upload-sarif@v3
      if: always()
      with: { sarif_file: trivy-fs.sarif, category: trivy-fs }

  trivy-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [trivy-fs]
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Build backend image (no push)
      uses: docker/build-push-action@v5
      with:
        context: backend
        push: false
        tags: authrex-backend:scan
        load: true
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@0.27.0
      with:
        image-ref: authrex-backend:scan
        format: sarif
        output: trivy-image.sarif
        severity: HIGH,CRITICAL
        exit-code: '1'
    - uses: github/codeql-action/upload-sarif@v3
      if: always()
      with: { sarif_file: trivy-image.sarif, category: trivy-image }

  checkov:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: bridgecrewio/checkov-action@master
      with:
        directory: ops/terraform
        framework: terraform
        soft_fail: false
        output_format: sarif
        output_file_path: checkov.sarif
    - uses: github/codeql-action/upload-sarif@v3
      if: always()
      with: { sarif_file: checkov.sarif, category: checkov }
