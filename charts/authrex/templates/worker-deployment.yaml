apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authrex.fullname" . }}-worker
  labels:
    {{- include "authrex.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 25%, maxUnavailable: 0 } }
  selector:
    matchLabels:
      {{- include "authrex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "authrex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        {{- if .Values.linkerd.enabled }}
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-await: enabled
        {{- end }}
    spec:
      serviceAccountName: {{ include "authrex.fullname" . }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      securityContext: {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
      - name: worker
        image: {{ include "authrex.image" .Values.worker }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        securityContext: {{- toYaml .Values.containerSecurityContext | nindent 10 }}
        env:
        - { name: AUTHREX_CELL_ID, value: "{{ .Values.global.cellId }}" }
        - { name: AWS_REGION,      value: "{{ .Values.global.region }}" }
        - { name: LLM_PROVIDER,    value: "{{ .Values.config.llmProvider }}" }
        - { name: BEDROCK_MODEL_ID, value: "{{ .Values.config.bedrockModelId }}" }
        - { name: REDIS_URL,       value: "{{ .Values.config.redisUrl }}" }
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: {{ include "authrex.fullname" . }}-secrets, key: DATABASE_URL } }
        resources: {{- toYaml .Values.worker.resources | nindent 10 }}
        readinessProbe:
          exec: { command: ["python", "-c", "import sys; sys.exit(0)"] }
          periodSeconds: 30
{{- if and .Values.worker.keda.enabled }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "authrex.fullname" . }}-worker
  labels: {{- include "authrex.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "authrex.fullname" . }}-worker
  pollingInterval: {{ .Values.worker.keda.pollingInterval }}
  cooldownPeriod:  {{ .Values.worker.keda.cooldownPeriod }}
  minReplicaCount: {{ .Values.worker.keda.minReplicas }}
  maxReplicaCount: {{ .Values.worker.keda.maxReplicas }}
  triggers:
  - type: postgresql
    metadata:
      query: "SELECT GREATEST(0, COUNT(*))::INT FROM case_jobs WHERE status='queued'"
      targetQueryValue: "{{ .Values.worker.keda.targetQueryValue }}"
    authenticationRef:
      name: authrex-postgres
{{- end }}
