apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authrex.fullname" . }}-api
  labels:
    {{- include "authrex.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 25%, maxUnavailable: 0 }
  selector:
    matchLabels:
      {{- include "authrex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "authrex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        {{- if .Values.linkerd.enabled }}
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-await: enabled
        {{- end }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "authrex.fullname" . }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds | default 90 }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
      - name: api
        image: {{ include "authrex.image" .Values.api }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 10 }}
        ports: [{ containerPort: 8000, name: http }]
        env:
        - { name: AUTHREX_CELL_ID,    value: "{{ .Values.global.cellId }}" }
        - { name: AWS_REGION,         value: "{{ .Values.global.region }}" }
        - { name: ENVIRONMENT,        value: "{{ .Values.global.environment }}" }
        - { name: LLM_PROVIDER,       value: "{{ .Values.config.llmProvider }}" }
        - { name: BEDROCK_MODEL_ID,   value: "{{ .Values.config.bedrockModelId }}" }
        - { name: BEDROCK_HAIKU_MODEL_ID, value: "{{ .Values.config.bedrockHaikuModelId }}" }
        - { name: GENAI_GATEWAY_ENABLED, value: "{{ .Values.config.genaiGatewayEnabled }}" }
        - { name: V1_SUNSET_DATE,     value: "{{ .Values.config.v1SunsetDate }}" }
        - { name: REDIS_URL,          value: "{{ .Values.config.redisUrl }}" }
        - { name: DATABASE_READ_URL,  value: "{{ .Values.config.databaseReadUrl }}" }
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: {{ include "authrex.fullname" . }}-secrets, key: DATABASE_URL } }
        - name: JWT_SECRET
          valueFrom: { secretKeyRef: { name: {{ include "authrex.fullname" . }}-secrets, key: JWT_SECRET } }
        livenessProbe:
          httpGet: { path: /api/v1/healthz, port: http }
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /api/v1/healthz/deep, port: http }
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2
        startupProbe:
          httpGet: { path: /api/v1/healthz, port: http }
          failureThreshold: 30
          periodSeconds: 2
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        volumeMounts:
        - { name: tmp,    mountPath: /tmp }
        - { name: varlog, mountPath: /var/log }
      volumes:
      - { name: tmp,    emptyDir: {} }
      - { name: varlog, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "authrex.fullname" . }}-api
  labels:
    {{- include "authrex.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
  - { name: http, port: {{ .Values.api.service.port }}, targetPort: {{ .Values.api.service.targetPort }}, protocol: TCP }
  selector:
    {{- include "authrex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- if .Values.api.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "authrex.fullname" . }}-api
spec:
  minAvailable: {{ .Values.api.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "authrex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
