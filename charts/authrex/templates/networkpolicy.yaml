{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "authrex.fullname" . }}-deny-egress-default
  labels: {{- include "authrex.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "authrex.selectorLabels" . | nindent 6 }}
  policyTypes: ["Egress"]
  egress:
  # DNS first — required for everything else
  - to:
    - namespaceSelector: {}
      podSelector: { matchLabels: { k8s-app: kube-dns } }
    ports:
    - { protocol: UDP, port: 53 }
    - { protocol: TCP, port: 53 }
  # Documented allow-list
  {{- range .Values.networkPolicy.egressAllowed }}
  - to:
    - ipBlock: { cidr: {{ .cidr | quote }} }
    ports:
    - { protocol: TCP, port: {{ .port }} }
  {{- end }}
{{- end }}
