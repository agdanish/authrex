; Authrex — Alembic schema migration framework
;
; Replaces the inline `ensure_schema()` calls in `app/main.py` lifespan with
; a versioned, reviewable, blue-green-safe migration story:
;
;   alembic revision -m "add cases.cell_id"     # author a migration
;   alembic upgrade head                         # apply forward
;   alembic downgrade -1                         # rollback one step
;
; In production, `alembic upgrade head` runs as a Kubernetes Job before each
; rollout — the deploy doesn't proceed until migrations succeed.
; In dev / hackathon mode, `db/schema.sql` is still the source-of-truth for
; the baseline; Alembic's first migration is the "baseline marker" that just
; stamps the version table.
;
; Reference: https://alembic.sqlalchemy.org/en/latest/

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

; sqlalchemy.url is read from the env at runtime (alembic/env.py reads
; DATABASE_URL). DO NOT put a literal connection string here — it would
; get committed to git.
sqlalchemy.url =

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
