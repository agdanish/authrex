---
# Argo CD application that owns the KEDA install + the per-namespace
# ScaledObjects under ops/k8s/keda/.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: 2.15.1
    helm:
      releaseName: keda
      values: |
        prometheus:
          metricServer: { enabled: true }
          operator:     { enabled: true }
        watchNamespace: ""
  - repoURL: https://github.com/aerofyta/authrex.git
    targetRevision: main
    path: ops/k8s/keda
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
