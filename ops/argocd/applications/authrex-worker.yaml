---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authrex-worker
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: worker=authrex-worker
    argocd-image-updater.argoproj.io/worker.update-strategy: digest
spec:
  project: default
  source:
    repoURL: https://github.com/aerofyta/authrex.git
    targetRevision: main
    path: ops/k8s/worker
  destination:
    server: https://kubernetes.default.svc
    namespace: authrex
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
