# ─── Authrex API tier ────────────────────────────────────────────────────────
# Stateless FastAPI replicas. HPA scales horizontally on CPU + queue depth.
# Pod-level liveness uses /healthz; readiness uses /healthz too (DB-aware).
# Rolling deploys: maxUnavailable=0 so a tenant never sees 0 healthy pods.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: authrex-api
  namespace: authrex
  labels: { app: authrex, tier: api }
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: authrex, tier: api }
  template:
    metadata:
      labels: { app: authrex, tier: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: authrex-api
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/authrex/api:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef: { name: authrex-secrets }
            - configMapRef: { name: authrex-config }
          resources:
            requests: { cpu: "500m",  memory: "512Mi" }
            limits:   { cpu: "2000m", memory: "1Gi"  }
          readinessProbe:
            httpGet: { path: /api/v1/healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /api/v1/healthz, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          # Graceful drain: SIGTERM → preStop sleep gives ALB time to deregister
          lifecycle:
            preStop:
              exec: { command: ["sh", "-c", "sleep 15"] }
---
apiVersion: v1
kind: Service
metadata:
  name: authrex-api
  namespace: authrex
spec:
  type: ClusterIP
  selector: { app: authrex, tier: api }
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: authrex-api-hpa
  namespace: authrex
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: authrex-api
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 75 }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - { type: Percent, value: 50, periodSeconds: 60 }
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - { type: Pods,    value: 4,  periodSeconds: 60 }
        - { type: Percent, value: 100, periodSeconds: 60 }
      selectPolicy: Max
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authrex-api
  namespace: authrex
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /api/v1/healthz
    # Sticky sessions for SSE streaming (one user always lands on the same replica)
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=3600
spec:
  rules:
    - host: api.authrex.health
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authrex-api
                port: { number: 80 }
